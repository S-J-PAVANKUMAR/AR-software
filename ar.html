<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First WebAR</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

<a-scene
    mindar-image="imageTargetSrc: assets/targets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
        <img id="logo" src="assets/images/logo.png">
        <img id="portfolio" src="assets/images/portfolio.png">
        <img id="website" src="assets/images/website.png">
        <img id="call" src="assets/images/call.png">
    </a-assets>

    <a-camera
        position="0 0 0"
        look-controls="enabled:false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
    </a-camera>

    <a-entity mindar-image-target="targetIndex:0">

        <a-image
            src="#logo"
            position="0 0.65 0"
            width="0.25"
            height="0.25"
            transparent="true"
            animation__scale="property: scale;
                              from: 0 0 0;
                              to: 1 1 1;
                              dur: 800;
                              easing: easeOutBack"
            animation__float="property: position;
                              from: 0 0.48 0;
                              to: 0 0.52 0;
                              dir: alternate;
                              loop: true;
                              dur: 1200">
        </a-image>
        <a-image
            src="#portfolio"
            position="-0.45 -0.1 0"
            width="0.15"
            height="0.15">
        </a-image>

        <a-image
            src="#call"
            position="0.45 -0.10 0"
            width="0.15"
            height="0.15">
        </a-image>
        <a-image
            id="websiteBtn"
            class="clickable"
            open-link
            src="#website"
            position="0 -0.15 0"
            width="0.15"
            height="0.15">
            
        </a-image>

    </a-entity>

</a-scene>
<script>
AFRAME.registerComponent("open-link", {
  init: function () {
    this.el.addEventListener("click", () => {
      alert("Website button clicked!");
      window.open("https://chatgpt.com", "_blank");
    });
  }
});
</script>
</body>
</html>
