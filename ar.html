<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First WebAR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

<a-scene
    mindar-image="imageTargetSrc: assets/targets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Load 3D Models -->
    <a-assets>

        <a-asset-item
            id="businessCard"
            src="assets/models/business-card.glb">
        </a-asset-item>

        <a-asset-item
            id="phone"
            src="assets/models/phone.glb">
        </a-asset-item>

        <a-asset-item
            id="table"
            src="assets/models/table.glb">
        </a-asset-item>
        <img id="logo" src="assets/images/logo.png">

    </a-assets>

    <!-- Camera -->
    <a-camera
        position="0 0 0"
        look-controls="enabled:false">
    </a-camera>

    <!-- Image Target -->
    <a-entity mindar-image-target="targetIndex:0">

        <!-- Business Card -->
        <!-- Company Logo -->
        <a-image
            src="#logo"
            position="0 0.4 0"
            width="0.7"
            height="0.7"
            animation="property: scale;
                       from: 0 0 0;
                       to: 1 1 1;
                       dur: 800;
                       easing: easeOutBack;">
        </a-image>

    </a-entity>

</a-scene>

</body>

</html>
