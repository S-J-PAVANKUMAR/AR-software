<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First WebAR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

<a-scene
    mindar-image="imageTargetSrc: assets/targets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Load 3D Models -->
    <a-assets>

        <a-asset-item
            id="businessCard"
            src="assets/models/business-card.glb">
        </a-asset-item>

        <a-asset-item
            id="phone"
            src="assets/models/phone.glb">
        </a-asset-item>

        <a-asset-item
            id="table"
            src="assets/models/table.glb">
        </a-asset-item>

    </a-assets>

    <!-- Camera -->
    <a-camera
        position="0 0 0"
        look-controls="enabled:false">
    </a-camera>

    <!-- Image Target -->
    <a-entity mindar-image-target="targetIndex:0">

        <!-- Business Card -->
        <a-gltf-model
            src="#businessCard"
            position="0 0 0"
            rotation="0 0 0"
            scale="2 2 2"
            animation="property: rotation;
                       to:0 360 0;
                       loop:true;
                       dur:6000;">
        </a-gltf-model>

    </a-entity>

</a-scene>

</body>

</html>
