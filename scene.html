<!DOCTYPE html>
<html>
    <head>
        <title>first 3d scene</title>
        <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    </head>
    <bodY>
        <a-scene>
            <a-box 
             position="0 1 -3" color="red"
                animation="property: rotation;
                           to: 0 360 0;
                           dur: 1000;
                           loop:true;
                           easing: linear">
            </a-box>
           
            <a-plane
            position="0 0 -4"
            rotation="-90 0 0"
            width="10"
            height="10"
            color="green">
            </a-plane>

            <a-sky
            color="lightblue">
            </a-sky>
        </a-scene>

    </bodY>
</html>
